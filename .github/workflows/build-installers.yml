name: Build Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows Installer
            os: windows-latest
            bundle: nsis
            artifact_name: relayclip-windows-installer
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS Installer
            os: macos-latest
            bundle: dmg
            artifact_name: relayclip-macos-installer
            artifact_path: src-tauri/target/release/bundle/dmg/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm check

      - name: Build installer
        run: pnpm tauri build --bundles ${{ matrix.bundle }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

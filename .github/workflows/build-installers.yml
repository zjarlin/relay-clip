name: Build Platforms

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

env:
  RELAYCLIP_BUILD_NUMBER: ${{ github.run_number }}
  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
  GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
  APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
  APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
  APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

jobs:
  build_desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows Installer
            os: windows-latest
            bundle: nsis
            artifact_name: relayclip-windows-installer
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS Installer
            os: macos-latest
            bundle: dmg
            artifact_name: relayclip-macos-installer
            artifact_path: src-tauri/target/release/bundle/dmg/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm check

      - name: Apply calendar version
        run: pnpm version:calver

      - name: Build desktop bundle
        run: pnpm tauri build --bundles ${{ matrix.bundle }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  build_android:
    name: Android Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm check

      - name: Apply calendar version
        run: pnpm version:calver

      - name: Initialize Android project
        run: pnpm tauri android init --ci --skip-targets-install

      - name: Patch Android project
        run: node scripts/configure-android-project.mjs

      - name: Configure Android signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != '' }}
        shell: bash
        run: |
          mkdir -p src-tauri/gen/android
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > src-tauri/gen/android/relayclip-upload-keystore.jks
          cat > src-tauri/gen/android/keystore.properties <<EOF
          passwordFormatVersion=1
          storeFile=relayclip-upload-keystore.jks
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Build Android artifacts
        run: pnpm tauri android build --ci --apk --aab --split-per-abi

      - name: Locate Android bundle
        id: android_bundle
        shell: bash
        run: |
          AAB_PATH=$(find src-tauri/gen/android/app/build/outputs/bundle -name '*.aab' -print -quit)
          echo "path=$AAB_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: relayclip-android-packages
          path: |
            src-tauri/gen/android/app/build/outputs/**/*.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
          if-no-files-found: error

      - name: Publish Android internal testing release
        if: ${{ startsWith(github.ref, 'refs/tags/v') && steps.android_bundle.outputs.path != '' && env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.relayclip.mobile
          releaseFiles: ${{ steps.android_bundle.outputs.path }}
          track: internal

  build_ios:
    name: iOS Archive
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect iOS signing mode
        shell: bash
        run: |
          if [ -n "$APPLE_API_KEY_ID" ] && [ -n "$APPLE_API_ISSUER" ] && [ -n "$APPLE_API_PRIVATE_KEY" ] && [ -n "$APPLE_DEVELOPMENT_TEAM" ]; then
            echo "Using signed iOS archive mode"
          else
            echo "Apple signing secrets are missing; falling back to iOS project archive mode"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Ensure iOS build dependencies
        shell: bash
        run: |
          BREW_PACKAGES=()

          command -v xcodegen >/dev/null 2>&1 || BREW_PACKAGES+=(xcodegen)
          command -v pod >/dev/null 2>&1 || BREW_PACKAGES+=(cocoapods)
          command -v idevicesyslog >/dev/null 2>&1 || BREW_PACKAGES+=(libimobiledevice)

          if [ ${#BREW_PACKAGES[@]} -gt 0 ]; then
            brew install "${BREW_PACKAGES[@]}"
          fi

          xcodegen --version
          pod --version
          command -v idevicesyslog

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm check

      - name: Apply calendar version
        run: pnpm version:calver

      - name: Configure App Store Connect key
        if: ${{ env.APPLE_API_KEY_ID != '' && env.APPLE_API_ISSUER != '' && env.APPLE_API_PRIVATE_KEY != '' && env.APPLE_DEVELOPMENT_TEAM != '' }}
        shell: bash
        run: |
          mkdir -p "$HOME/private_keys"
          printf '%s\n' "$APPLE_API_PRIVATE_KEY" > "$HOME/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"

      - name: Initialize iOS project
        if: ${{ env.APPLE_API_KEY_ID != '' && env.APPLE_API_ISSUER != '' && env.APPLE_API_PRIVATE_KEY != '' && env.APPLE_DEVELOPMENT_TEAM != '' }}
        run: pnpm tauri ios init --ci --skip-targets-install

      - name: Build signed iOS archive
        if: ${{ env.APPLE_API_KEY_ID != '' && env.APPLE_API_ISSUER != '' && env.APPLE_API_PRIVATE_KEY != '' && env.APPLE_DEVELOPMENT_TEAM != '' }}
        env:
          APPLE_API_KEY: ${{ env.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
          APPLE_DEVELOPMENT_TEAM: ${{ env.APPLE_DEVELOPMENT_TEAM }}
        run: pnpm tauri ios build --ci --export-method app-store-connect --build-number $RELAYCLIP_BUILD_NUMBER

      - name: Locate IPA
        if: ${{ env.APPLE_API_KEY_ID != '' && env.APPLE_API_ISSUER != '' && env.APPLE_API_PRIVATE_KEY != '' && env.APPLE_DEVELOPMENT_TEAM != '' }}
        id: ios_ipa
        shell: bash
        run: |
          IPA_PATH=$(find src-tauri/gen/apple/build -name '*.ipa' -print -quit)
          echo "path=$IPA_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload iOS artifact
        if: ${{ env.APPLE_API_KEY_ID != '' && env.APPLE_API_ISSUER != '' && env.APPLE_API_PRIVATE_KEY != '' && env.APPLE_DEVELOPMENT_TEAM != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: relayclip-ios-archive
          path: src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: error

      - name: Initialize unsigned iOS project
        if: ${{ env.APPLE_API_KEY_ID == '' || env.APPLE_API_ISSUER == '' || env.APPLE_API_PRIVATE_KEY == '' || env.APPLE_DEVELOPMENT_TEAM == '' }}
        env:
          APPLE_DEVELOPMENT_TEAM: TEAMID0000
        run: pnpm tauri ios init --ci --skip-targets-install

      - name: Add unsigned iOS archive note
        if: ${{ env.APPLE_API_KEY_ID == '' || env.APPLE_API_ISSUER == '' || env.APPLE_API_PRIVATE_KEY == '' || env.APPLE_DEVELOPMENT_TEAM == '' }}
        shell: bash
        run: |
          cat > src-tauri/gen/apple/README-CODE-SIGNING.txt <<'EOF'
          This archive contains an unsigned iOS Xcode project generated without Apple signing secrets.
          Replace the placeholder development team ID TEAMID0000 with your real Apple Developer Team ID
          before building or archiving the app in Xcode.
          EOF

      - name: Package iOS project archive
        if: ${{ env.APPLE_API_KEY_ID == '' || env.APPLE_API_ISSUER == '' || env.APPLE_API_PRIVATE_KEY == '' || env.APPLE_DEVELOPMENT_TEAM == '' }}
        shell: bash
        run: |
          rm -f relayclip-ios-project.zip
          cd src-tauri/gen
          zip -r ../../relayclip-ios-project.zip apple

      - name: Upload iOS project artifact
        if: ${{ env.APPLE_API_KEY_ID == '' || env.APPLE_API_ISSUER == '' || env.APPLE_API_PRIVATE_KEY == '' || env.APPLE_DEVELOPMENT_TEAM == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: relayclip-ios-project
          path: relayclip-ios-project.zip
          if-no-files-found: error

      - name: Upload to TestFlight
        if: ${{ env.APPLE_API_KEY_ID != '' && env.APPLE_API_ISSUER != '' && steps.ios_ipa.outputs.path != '' }}
        shell: bash
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "${{ steps.ios_ipa.outputs.path }}" \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER"

  release:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build_desktop
      - build_android
      - build_ios
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/relayclip-windows-installer/*.exe
            release-assets/relayclip-macos-installer/*.dmg
            release-assets/relayclip-android-packages/**/*.apk
            release-assets/relayclip-android-packages/**/*.aab
            release-assets/relayclip-ios-archive/**/*.ipa
            release-assets/relayclip-ios-project/**/*.zip

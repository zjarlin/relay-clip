name: Build Platforms

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]"

permissions:
  contents: write

env:
  RELAYCLIP_BUILD_NUMBER: ${{ github.run_number }}
  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
  GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
  APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
  APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
  APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

jobs:
  build_desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows Installer
            os: windows-latest
            bundle: nsis
            artifact_name: relayclip-windows-installer
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS Installer
            os: macos-latest
            bundle: dmg
            artifact_name: relayclip-macos-installer
            artifact_path: src-tauri/target/release/bundle/dmg/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm check

      - name: Apply calendar version
        run: pnpm version:calver

      - name: Build desktop bundle
        run: pnpm tauri build --bundles ${{ matrix.bundle }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  build_android:
    name: Android Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm check

      - name: Apply calendar version
        run: pnpm version:calver

      - name: Initialize Android project
        run: pnpm tauri android init --ci --skip-targets-install

      - name: Patch Android project
        run: node scripts/configure-android-project.mjs

      - name: Configure Android signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != '' }}
        shell: bash
        run: |
          mkdir -p src-tauri/gen/android src-tauri/gen/android/app
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > src-tauri/gen/android/app/relayclip-upload-keystore.jks
          cat > src-tauri/gen/android/keystore.properties <<EOF
          passwordFormatVersion=1
          storeFile=relayclip-upload-keystore.jks
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Generate ephemeral Android signing key
        if: ${{ env.ANDROID_KEYSTORE_BASE64 == '' || env.ANDROID_KEYSTORE_PASSWORD == '' || env.ANDROID_KEY_ALIAS == '' || env.ANDROID_KEY_PASSWORD == '' }}
        shell: bash
        run: |
          mkdir -p src-tauri/gen/android src-tauri/gen/android/app

          STORE_PASSWORD="$(openssl rand -hex 16)"
          KEY_ALIAS="relayclip-ephemeral"
          KEY_PASSWORD="$STORE_PASSWORD"

          keytool -genkeypair \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -storetype PKCS12 \
            -keystore src-tauri/gen/android/app/relayclip-ephemeral-keystore.jks \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=RelayClip Ephemeral CI, OU=CI, O=RelayClip, L=Internet, ST=Internet, C=US"

          cat > src-tauri/gen/android/keystore.properties <<EOF
          passwordFormatVersion=1
          storeFile=relayclip-ephemeral-keystore.jks
          storePassword=${STORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Add Android signing note
        shell: bash
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            cat > ANDROID-SIGNING.txt <<'EOF'
          Android APKs in this build are signed with the configured release keystore.
          EOF
          else
            cat > ANDROID-SIGNING.txt <<'EOF'
          Android APKs in this build are signed with a temporary CI-generated release keystore.
          These APKs are installable on regular Android devices, but future builds signed with a different key will not install as upgrades.
          EOF
          fi

      - name: Build Android artifacts
        run: pnpm tauri android build --ci --apk --aab --split-per-abi

      - name: Locate Android bundle
        id: android_bundle
        shell: bash
        run: |
          AAB_PATH=$(find src-tauri/gen/android/app/build/outputs/bundle -name '*.aab' -print -quit)
          echo "path=$AAB_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: relayclip-android-packages
          path: |
            ANDROID-SIGNING.txt
            src-tauri/gen/android/app/build/outputs/**/*.apk
          if-no-files-found: error

      - name: Publish Android internal testing release
        if: ${{ (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/20')) && steps.android_bundle.outputs.path != '' && env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' && env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.relayclip.mobile
          releaseFiles: ${{ steps.android_bundle.outputs.path }}
          track: internal

  build_ios:
    name: iOS Unsigned Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Ensure iOS build dependencies
        shell: bash
        run: |
          BREW_PACKAGES=()

          command -v xcodegen >/dev/null 2>&1 || BREW_PACKAGES+=(xcodegen)
          command -v pod >/dev/null 2>&1 || BREW_PACKAGES+=(cocoapods)
          command -v idevicesyslog >/dev/null 2>&1 || BREW_PACKAGES+=(libimobiledevice)

          if [ ${#BREW_PACKAGES[@]} -gt 0 ]; then
            brew install "${BREW_PACKAGES[@]}"
          fi

          xcodegen --version
          pod --version
          command -v idevicesyslog

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm check

      - name: Apply calendar version
        run: pnpm version:calver

      - name: Initialize iOS project
        env:
          APPLE_DEVELOPMENT_TEAM: TEAMID0000
        run: pnpm tauri ios init --ci --skip-targets-install

      - name: Patch iOS project
        run: node scripts/configure-apple-project.mjs

      - name: Build unsigned iOS app
        shell: bash
        run: |
          pnpm tauri build --bundles ios --target aarch64-apple-ios --no-sign --ci

      - name: Package unsigned iOS IPA
        shell: bash
        run: |
          APP_PATH=$(find src-tauri -type d -name '*.app' -print -quit)
          IPA_PATH=$(find src-tauri -type f -name '*.ipa' -print -quit)
          OUTPUT_IPA=relayclip-ios-unsigned.ipa

          rm -rf Payload "$OUTPUT_IPA"

          if [ -n "$IPA_PATH" ]; then
            cp "$IPA_PATH" "$OUTPUT_IPA"
            exit 0
          fi

          if [ -z "$APP_PATH" ]; then
            echo "Unsigned iOS app not found"
            find src-tauri -maxdepth 8 \( -name '*.app' -o -name '*.ipa' -o -name '*.xcarchive' \)
            exit 1
          fi

          mkdir -p Payload
          ditto "$APP_PATH" "Payload/$(basename "$APP_PATH")"
          ditto -c -k --sequesterRsrc --keepParent Payload "$OUTPUT_IPA"

      - name: Upload unsigned iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: relayclip-ios-unsigned-ipa
          path: relayclip-ios-unsigned.ipa
          if-no-files-found: error

  release:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/20')
    needs:
      - build_desktop
      - build_android
      - build_ios
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/relayclip-windows-installer/*.exe
            release-assets/relayclip-macos-installer/*.dmg
            release-assets/relayclip-android-packages/**/*.apk
            release-assets/relayclip-ios-unsigned-ipa/**/*.ipa
